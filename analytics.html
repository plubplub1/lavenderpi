<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavender Home OS — Analytics</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="analytics">
  <div id="lh-header"></div>
  <div class="app-shell">
    <div id="lh-sidebar"></div>
    <main class="app-main">
      <div class="page-wrap">
        <div class="page-header" style="display:flex;flex-direction:column;gap:1rem;">
          <div style="display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:1rem;">
            <div>
              <h1 class="font-display">Analytics</h1>
              <p>Traffic history and top consumers across your network.</p>
            </div>
            <div class="glass pill-tabs">
              <button class="active" data-period="Hourly">Hourly</button>
              <button data-period="Daily">Daily</button>
              <button data-period="Weekly">Weekly</button>
              <button data-period="Monthly">Monthly</button>
            </div>
          </div>
        </div>

        <div style="display:grid;gap:1.25rem;">
          <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
              <h2 class="font-display" style="font-size:1rem;font-weight:500;margin:0;">Realtime Bandwidth</h2>
              <span id="period-label" style="font-size:.75rem;color:var(--ink-faint);">Hourly view</span>
            </div>
            <div class="chart-box"><canvas id="bandwidth-chart"></canvas></div>
          </div>

          <div style="display:grid;grid-template-columns:1fr;gap:1.25rem;">
            <div class="card">
              <h2 class="font-display" style="font-size:1rem;font-weight:500;margin:0 0 1rem;">Top Devices Today</h2>
              <div class="chart-box"><canvas id="top-devices-chart"></canvas></div>
            </div>
            <div class="card">
              <h2 class="font-display" style="font-size:1rem;font-weight:500;margin:0 0 1rem;">Band Distribution</h2>
              <div class="chart-box"><canvas id="band-split-chart"></canvas></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <div id="lh-mobile-nav"></div>

  <style>
    @media (min-width: 1024px) {
      .app-main .page-wrap > div[style*="grid-template-columns:1fr"] { grid-template-columns: 1fr 1fr !important; }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/settings-store.js"></script>
  <script src="assets/js/router-client.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/pages/analytics.js"></script>
</body>
</html>
